name: CI

"on":
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

# Cancel in-progress runs on the same branch when a new push arrives.
# Keeps the queue clean without waiting for stale runs to finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (no DB required)
        env:
          # Provide required settings so the app can be imported without a
          # real .env file. These are test-only values — no real secrets.
          ANTHROPIC_API_KEY: "test-key-ci"
          JWT_SECRET_KEY: "ci-test-jwt-secret-not-for-production"
          OAUTH2_CLIENT_ID: "ci-client"
          OAUTH2_CLIENT_SECRET_HASH: "$2b$04$ci.placeholder.hash.xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          NEO4J_URI: "bolt://localhost:7687"
          NEO4J_USER: "neo4j"
          NEO4J_PASSWORD: "test"
        run: |
          pytest tests/ -m "not db" \
            --tb=short \
            --strict-markers \
            -q \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'   # upload once, not per matrix leg
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install flake8 black mypy

      - name: flake8
        run: |
          flake8 src/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,.venv

      - name: black (check only)
        run: black --check --line-length=100 src/

      - name: mypy (non-blocking)
        # mypy findings are reported but don't fail the build yet.
        # Remove `|| true` once type coverage is complete.
        run: mypy src/ --ignore-missing-imports || true